# ccvm - Claude Code VM
# Lima VM definition for running Claude Code in auto mode with Docker support.
# Based on Lima's docker template (rootless Docker with probes).
#
# Usage: This file is referenced by the ccvm script.
# Do not start directly with limactl — use `ccvm` instead.

base:
  - template:docker

cpus: 2
memory: "4GiB"

# All mounts are configured dynamically by the ccvm script via --set.
# Workspace is mounted RW at /workspace, Claude settings are mounted RO.
# GitHub CLI auth (~/.config/gh) is optionally mounted RO when --gh is passed.
mounts: []

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -euxo pipefail

      # Basic tools
      apt-get update
      apt-get install -y git ripgrep fd-find jq fzf

      # GitHub CLI
      curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
      chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" > /etc/apt/sources.list.d/github-cli.list
      apt-get update
      apt-get install -y gh

      # Clean up
      apt-get clean
      rm -rf /var/lib/apt/lists/*

  - mode: user
    script: |
      #!/bin/bash
      set -euxo pipefail

      # Claude Code
      curl -fsSL https://claude.ai/install.sh -o /tmp/claude-install.sh
      bash /tmp/claude-install.sh
      rm -f /tmp/claude-install.sh

      # Set up ~/.claude/ with host config (RO) and writable local state
      mkdir -p "$HOME/.claude"
      ln -sfn /mnt/host-claude-config/settings.json "$HOME/.claude/settings.json"
      ln -sfn /mnt/host-claude-config/rules "$HOME/.claude/rules"
      ln -sfn /mnt/host-claude-config/skills "$HOME/.claude/skills"
      ln -sfn /mnt/host-claude-config/hooks "$HOME/.claude/hooks"
      ln -sfn /mnt/host-claude-config/agents "$HOME/.claude/agents"
      ln -sfn /mnt/host-claude-config/CLAUDE.md "$HOME/.claude/CLAUDE.md"
      ln -sfn /mnt/host-claude-config/statusline.py "$HOME/.claude/statusline.py"

      # Set up Claude memory (RO from host)
      ln -sfn /mnt/host-claude-projects "$HOME/.claude/projects"

      # Set up GitHub CLI auth (only if host mount exists, i.e. --gh was passed)
      if [ -d /mnt/host-gh ]; then
          mkdir -p "$HOME/.config"
          ln -sfn /mnt/host-gh "$HOME/.config/gh"
      fi
