# 見た目に関する設定

# 色を変数として定義（Iceberg テーマ）
set -g @color_bg "#1e2132"
set -g @color_gray "#6b7089"
set -g @color_light_gray "#c6c8d1"
set -g @color_black "#000000"

# ステータスバーを最小限に
set -g status-position bottom
set -g status-justify left
# セッション名を表示（背景色は指定しない、暗い色、大文字）
set -g status-left "#[fg=#{@color_gray}]#(echo '#{session_name}' | tr '[:lower:]' '[:upper:]') "
set -g status-right ""
set -g status-left-length 50
set -g status-right-length 20

set -g status-style "bg=default"

# ウィンドウの色を定義
set -g @color_active "#1e2132"
set -g @color_inactive "#0a0a0a"
set -g @color_text "#6b7089"
set -g @color_message_fg "#c6c8d1"
set -g @color_message_bg "#1e2132"
set -g @color_active_pane "#000000"
set -g @color_inactive_pane "#222222"

# 非アクティブウィンドウ（暗いグレー）
set -g window-status-format "#[fg=#{@color_text},bg=default] #W"

# アクティブウィンドウ（明るいグレー + bold）
set -g window-status-current-format "#[fg=#{@color_light_gray},bg=default,bold] #W"

# コピーモードの選択ハイライト（Iceberg）
set -g mode-style "bg=#3d425b,fg=#c6c8d1"

# メッセージ表示の見た目を変更
set -g message-style "bg=#{@color_message_bg},fg=#{@color_message_fg}"
set -g message-command-style "bg=#{@color_message_bg},fg=#{@color_message_fg}"

# ペイン境界線を見やすい色に（iceberg_minimal の設定を上書き）
set -g pane-active-border-style "fg=#6b7089"
set -g pane-border-style "fg=#4e5278"
set -g pane-border-status bottom
set -g pane-border-format "#{?pane_in_mode,#[fg=#e2a478][COPY]#{?#{search_count}, [#{search_count}],},#(~/.config/tmux/short-path.sh '#{pane_current_path}')}"

# 非アクティブペーンを明るく、アクティブペーンを暗くして区別する
set -g window-style "bg=#2a2d3a"
set -g window-active-style "bg=#161821"
