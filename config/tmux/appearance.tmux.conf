# 見た目に関する設定

# 色を変数として定義（Iceberg テーマ）
set -g @color_bg "#1e2132"
set -g @color_gray "#6b7089"
set -g @color_light_gray "#c6c8d1"
set -g @color_black "#000000"

# ステータスバーを最小限に
set -g status-position bottom
set -g status-justify left
set -g status-left ""
# 現在のモードを表示（コピーモードなど）
set -g status-right "#{?pane_mode,#[fg=#{@color_gray}]#{pane_mode},}"
set -g status-left-length 0
set -g status-right-length 20

# ステータスバーを細く見せる（パディングを減らす）
# ステータスバーの背景色を黒に設定
set -g status-style "bg=#{@color_black},default"

# wezterm のタブ風の見た目（nerdfonts の三角形の境界付き）
# Powerline Extra Symbols の三角形を変数として定義
set -g @ple_lower_right_triangle "\ue0ba"
set -g @ple_upper_left_triangle "\ue0bc"

# 非アクティブウィンドウ（背景色も black）
set -g window-status-style "bg=#{@color_black},fg=#{@color_gray},bold"
set -g window-status-format "#[fg=#{@color_black},bg=#{@color_black},bold]#{@ple_lower_right_triangle}#[bg=#{@color_black},fg=#{@color_light_gray},bold] #W #[fg=#{@color_black},bg=#{@color_black},bold]#{@ple_upper_left_triangle}"

# アクティブウィンドウ（メッセージと同じ色）
set -g window-status-current-style "bg=#{@color_bg},fg=#{@color_light_gray},bold"
set -g window-status-current-format "#[fg=#{@color_bg},bg=#{@color_black},bold]#{@ple_lower_right_triangle}#[bg=#{@color_bg},fg=#{@color_light_gray},bold] #W #[bg=#{@color_black},fg=#{@color_bg},bold]#{@ple_upper_left_triangle}"

# ウィンドウ間の区切り
# set -g window-status-separator ""

# メッセージ表示の見た目を変更
set -g message-style "bg=#{@color_bg},fg=#{@color_light_gray}"
set -g message-command-style "bg=#{@color_bg},fg=#{@color_light_gray}"
