# 見た目に関する設定

# 色を変数として定義（Iceberg テーマ）
set -g @color_bg "#1e2132"
set -g @color_gray "#6b7089"
set -g @color_light_gray "#c6c8d1"
set -g @color_black "#000000"

# ステータスバーを最小限に
set -g status-position bottom
set -g status-justify left
# セッション名を表示（背景色は指定しない、暗い色、大文字）
set -g status-left "#[fg=#{@color_gray}]#(echo '#{session_name}' | tr '[:lower:]' '[:upper:]') "
# 現在のモードを表示（コピーモードなど）
set -g status-right "#{?pane_mode,#[fg=#{@color_gray}]#{pane_mode},}"
set -g status-left-length 50
set -g status-right-length 20

# ステータスバーを細く見せる（パディングを減らす）
# ステータスバーの背景色を黒に設定
set -g status-style "bg=default"

# ウィンドウの色を定義
set -g @color_active "#1e2132"
set -g @color_inactive "#0a0a0a"
set -g @color_text "#6b7089"
set -g @color_message_fg "#c6c8d1"
set -g @color_message_bg "#1e2132"
set -g @color_active_pane "#000000"
set -g @color_inactive_pane "#222222"

# wezterm のタブ風の見た目（nerdfonts の三角形の境界付き）
# Powerline Extra Symbols の三角形を変数として定義
set -g @ple_lower_right_triangle "\ue0ba"
set -g @ple_upper_left_triangle "\ue0bc"

# 非アクティブウィンドウ（背景色も black）
set -g window-status-format "#[fg=#{@color_inactive},bg=default]#{@ple_lower_right_triangle}#[fg=#{@color_text},bg=#{@color_inactive}] #W #[fg=#{@color_inactive},bg=default]#{@ple_upper_left_triangle}"

# アクティブウィンドウ（メッセージと同じ色）
set -g window-status-current-format "#[fg=#{@color_active},bg=default]#{@ple_lower_right_triangle}#[fg=#{@color_text},bg=#{@color_active}] #W #[fg=#{@color_active},bg=default]#{@ple_upper_left_triangle}"

# メッセージ表示の見た目を変更
set -g message-style "bg=#{@color_message_bg},fg=#{@color_message_fg}"
set -g message-command-style "bg=#{@color_message_bg},fg=#{@color_message_fg}"

# ペイン境界線を目立たない色に（iceberg_minimal の設定を上書き）
set -g pane-active-border-style "fg=#2a2d3a"
set -g pane-border-style "fg=#2a2d3a"

# アクティブペーンの背景色を明るく、非アクティブペーンを暗く
set -g window-style "bg=#{@color_inactive_pane}"
set -g window-active-style "bg=#{@color_active_pane}"
