# 見た目に関する設定

# ステータスバーを最小限に
set -g status-position bottom
set -g status-justify left
set -g status-left ""
# 現在のモードを表示（コピーモードなど）
set -g status-right "#{?pane_mode,#[fg=#6b7089]#{pane_mode},}"
set -g status-left-length 0
set -g status-right-length 20

# ステータスバーを細く見せる（パディングを減らす）
set -g status-style "bg=#1e2132,default"
set -g window-status-format " #W "
set -g window-status-current-format " #W "

# アクティブウィンドウの背景色を変更
set -g window-status-current-style "bg=#1e2132,fg=#c6c8d1,bold"

# メッセージ表示の見た目を変更
set -g message-style "bg=#1e2132,fg=#c6c8d1"
set -g message-command-style "bg=#1e2132,fg=#c6c8d1"
