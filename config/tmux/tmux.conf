# TPM (Tmux Plugin Manager) の設定
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @fzf-url-history-limit '32768'
set -g @fzf-url-open '/Users/yuyamada/.config/tmux/scripts/open-url.sh'
set -g @plugin 'tmux-plugins/tmux-open'
# 再起動後に tmux を起動したとき、前回のセッションを自動復元（continuum が定期保存した内容）
set -g @continuum-restore 'on'

# Prefix キーを Ctrl+f に変更
set -g prefix C-f
unbind C-b

# Iceberg テーマ（iceberg-dark）
source ~/.config/tmux/iceberg_minimal.tmux.conf

# 見た目の設定
source ~/.config/tmux/appearance.tmux.conf

# マウスでスクロール
setw -g mouse on
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

set -g allow-passthrough on
set -ga terminal-features "*:hyperlinks"
set -s extended-keys on

# Cmd+C で選択範囲をクリップボードにコピー（macOS では Cmd が Meta として送られる）
bind-key -T copy-mode-vi M-c send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode    M-c send -X copy-pipe-and-cancel "pbcopy"

# ウィンドウ番号を 1 始まりに
set -g base-index 1
setw -g pane-base-index 1

# コピーモードを vi スタイルに
setw -g mode-keys vi

# ウィンドウ名の自動更新を無効（zsh の precmd で手動更新）
set -g automatic-rename off

# ペイン切り替え時にアクティブペインのタイトルをウィンドウ名に反映
set-hook -g after-select-pane "rename-window '#{pane_title}'"

# keybinds
bind r source ~/.config/tmux/tmux.conf
bind x kill-pane

# copy-mode（Prefix C-f で normal ⇔ copy mode をトグル）
bind C-f if -F '#{pane_in_mode}' 'send-keys -X cancel' 'copy-mode -H'
# ペイン出力をキャプチャして nvim で開く（ANSI 色付き: -e）
bind-key e capture-pane -e -S -32768 \; \
    save-buffer /tmp/tmux-capture.ansi \; \
    new-window -n "LOG" "nvim /tmp/tmux-capture.ansi -c 'set ft=ansi' +AnsiEnable +$ ; rm -f /tmp/tmux-capture.ansi"
bind -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X begin-selection \; send-keys -X rectangle-on
# yy で「1行選択してコピー」し、選択を解除する (Vim yy)
# 1. 始点に移動 2. 行全体を選択 3. 行末の空白を削ってコピー 4. 選択解除
bind-key -T copy-mode-vi y if-shell -F "#{selection_present}" \
    "send-keys -X copy-pipe \"sed 's/[[:space:]]*$//' | pbcopy\" ; send-keys -X clear-selection" \
    "send-keys -X select-line ; send-keys -X copy-pipe \"sed 's/[[:space:]]*$//' | pbcopy\" ; send-keys -X clear-selection"
# p でペーストする瞬間に、バッファから改行を消して送り出す
bind-key -T copy-mode-vi p send-keys -X cancel \; run-shell "tmux save-buffer - | tr -d '\n' | tmux load-buffer - ; tmux paste-buffer"
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi C-a send-keys -X start-of-line
bind -T copy-mode-vi C-e send-keys -X end-of-line
bind-key -T copy-mode-vi K send-keys -X page-up
bind-key -T copy-mode-vi J send-keys -X page-down
bind-key -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X scroll-down
bind-key -T copy-mode-vi Up    send-keys -X scroll-up
bind-key -T copy-mode-vi Down  send-keys -X scroll-down
bind-key -T copy-mode-vi C-k   send-keys -X scroll-up
bind-key -T copy-mode-vi C-j   send-keys -X scroll-down

bind-key -T copy-mode-vi / command-prompt -i -p "search up" "send -X search-backward-incremental \"%%%\""
# wip: fzf でペイン内容を検索してジャンプ
# bind f run -b "~/.config/tmux/fzf-search.sh"
bind-key -T copy-mode-vi u send-keys -X search-backward "https\?://[^ ]*"

# 確認プロンプトで Enter キーを押すとデフォルト（yes）を選択
bind-key -T command-prompt Enter send-keys y

# TPM の初期化（ファイルの最後に記述）
# 設定ファイルが ~/.config/tmux/tmux.conf の場合、プラグインは ~/.config/tmux/plugins/ にインストールされる
run ~/.config/tmux/plugins/tpm/tpm

# ペインを左右に移動、端でサイズをサイクル (2/3 → 1/2 → 1/3 → 2/3)
# TPM より後に記述して pain-control の C-h/C-l を上書き
bind -n S-Left  run-shell -b "~/.config/tmux/scripts/cycle_pane.sh left"
bind -n S-Right run-shell -b "~/.config/tmux/scripts/cycle_pane.sh right"

# 設定ファイル読み込み時にメッセージを表示
run-shell 'tmux display-message "May the force be with you."'
