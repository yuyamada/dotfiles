# TPM (Tmux Plugin Manager) の設定
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-pain-control'

# Prefix キーを Ctrl+f に変更
set -g prefix C-f
unbind C-b

# Iceberg テーマ（iceberg-dark）
source ~/.config/tmux/iceberg_minimal.tmux.conf

# 見た目の設定
source ~/.config/tmux/appearance.tmux.conf

# ウィンドウ番号を 1 始まりに
set -g base-index 1
setw -g pane-base-index 1

# コピーモードを vi スタイルに
setw -g mode-keys vi

# keybinds
bind r source ~/.config/tmux/tmux.conf
bind x kill-pane

## copy-mode
bind C-f copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle

# 確認プロンプトで Enter キーを押すとデフォルト（yes）を選択
bind-key -T command-prompt Enter send-keys y

# TPM の初期化（ファイルの最後に記述）
# 設定ファイルが ~/.config/tmux/tmux.conf の場合、プラグインは ~/.config/tmux/plugins/ にインストールされる
run ~/.config/tmux/plugins/tpm/tpm

# 設定ファイル読み込み時にメッセージを表示
run-shell 'tmux display-message "May the force be with you."'
